<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"Segoe UI","Microsoft YaHei",sans-serif;background:#f5f6fa;color:#333;min-height:100vh}
.top-bar{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.top-bar h1{font-size:20px;font-weight:600}
.toolbar{background:#fff;border-bottom:1px solid #e5e7eb;padding:12px 24px;display:flex;gap:12px;align-items:center}
.s-input{padding:7px 12px;border:1px solid #d1d5db;border-radius:6px;width:280px;font-size:13px}
.s-input:focus{outline:0;border-color:#667eea}
select.select{padding:7px 12px;border:1px solid #d1d5db;border-radius:6px;font-size:13px}

tbody tr:hover{background:#f9fafb}
tbody td{padding:10px 16px}
.cname{font-weight:600;color:#1f2937}
.tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:500}
.tag-g{background:#dbeafe;color:#2563eb}.tag-y{background:#fef3c7;color:#d97706}.tag-t{background:#d1fae5;color:#059669}.tag-a{background:#fce7f3;color:#db2777}.tag-b{background:#e0e7ff;color:#4f46e5}
.link-btn{color:#3b82f6;text-decoration:none;font-size:12px;font-weight:500}
.edu-b{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;background:#f0f0f0;color:#4b5563}
.del-btn{background:0 0;border:0;color:#999;cursor:pointer;font-size:16px;padding:0 4px}
.del-btn:hover{color:#ef4444}
#empty{text-align:center;padding:80px 20px;background:#fff;margin:20px 24px;border-radius:8px}
#empty .icon{font-size:64px;margin-bottom:16px}
#empty h3{color:#4b5563;font-size:18px;margin-bottom:8px}
#empty p{color:#9ca3b6;font-size:14px}
.toast{position:fixed;bottom:24px;right:24px;background:#1f2937;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;opacity:0;transform:translateY(20px);transition:all .3s;z-index:1000;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.95);z-index:999;display:none;flex-direction:column;align-items:center;justify-content:center}
.spinner{width:48px;height:48px;border:4px solid #e5e7eb;border-top-color:#667eea;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px}
.text{color:#4b5563;font-size:15px}
.pbar{width:300px;height:6px;background:#e5e7eb;border-radius:3px;margin-top:12px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:3px;transition:width .3s;width:0%}
@keyframes spin{to{transform:rotate(360deg)}}
.btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:all .2s;margin-left:8px}
.btn-p{background:#fff;color:#667eea}.btn-p:hover{background:#f0f0ff}
.btn-g{background:#10b981;color:#fff}.btn-g:hover{background:#059669}
.btn-o{background:#f59e0b;color:#fff}.btn-o:hover{background:#d97706}
.btn-d{background:#1f2937;color:#fff}.btn-d:hover{background:#374151}
</style>

    var saved = localStorage.getItem("xiaozhao_radar_data");

        }catch(e){D=[];}

function startCrawl(){

            pf.style.width=((i+1)/SAMPLE_DATA.length*100)+'%';
            i++;
            setTimeout(step,150);
        }
        step();
    },500);
}

function addRow(){
    D.unshift({c:"",p:"",l:"",e:"本科及以上",w:"",d:"",s:"",u:""});F=D.slice();render();saveData();
    toast("已添加新行，双击编辑");
}

function delRow(idx){
    if(confirm("确定删除？")){D.splice(idx,1);F=D.slice();render();saveData();toast("已删除");}
}

function clearAll(){
    if(!D.length)return;if(confirm("确定清空？")){D=[];F=[];render();saveData();toast("已清空");}
}

function editCell(cell,idx,f){
    var inp=document.createElement("input");
    inp.type="text";inp.value=cell.textContent||"";
    inp.style.cssText="width:100%;border:none;outline:none;background:#fff8e1;font-size:13px";
    cell.textContent="";cell.appendChild(inp);inp.focus();inp.select();
    function save(){D[idx][f]=inp.value;cell.textContent=inp.value||"";saveData();}
    inp.onblur=save;
    inp.onkeydown=function(e){if(e.key==="Enter")save();if(e.key==="Escape"){inp.value="";save();}};
}

function render(){
    var tb=document.getElementById('tbody');
    var em=document.getElementById('empty');
    var dt=document.getElementById('dataTable');
    var st=document.getElementById('stats');
    st.textContent="共 "+F.length+" 条记录"+(F.length!==D.length?"（已筛选）":"");
    if(!F.length){dt.style.display="none";em.style.display="block";return;}
    dt.style.display="table";em.style.display="none";
    var h="";
    F.forEach(function(item,i){
        var sc={"国聘":"tag-g","应届生求职网":"tag-y","腾讯招聘":"tag-t","阿里巴巴":"tag-a","字节跳动":"tag-b"};
        var cls=sc[item.s]||"tag-g";
        h+='<tr>';
        h+='<td style="color:#9ca3b6;font-size:12px">'+(i+1)+'</td>';
        h+='<td><span class="cname" ondblclick="editCell(this,'+i+',"c")">'+(item.c||"-")+'</span></td>';
        h+='<td><span ondblclick="editCell(this,'+i+',"p")">'+(item.p||"-")+'</span></td>';
        h+='<td><span ondblclick="editCell(this,'+i+',"l")">'+(item.l||"-")+'</span></td>';
        h+='<td><span class="edu-b" ondblclick="editCell(this,'+i+',"e")">'+(item.e||"-")+'</span></td>';
        h+='<td><span ondblclick="editCell(this,'+i+',"w")">'+(item.w||"-")+'</span></td>';
        h+='<td><span ondblclick="editCell(this,'+i+',"d")">'+(item.d||"-")+'</span></td>';
        h+='<td><span class="'+cls+'">'+(item.s||"-")+'</span></td>';
        h+='<td>'+(item.u?'<a class="link-btn" href="'+item.u+'" target="_blank">访问</a>':'-')+'</td>';
        h+='<td><button class="del-btn" onclick="delRow('+i+')">x</button></td>';
        h+='</tr>';
    });
    tb.innerHTML=h;
}

function filterData(){
    var sv=document.getElementById("searchInput").value.toLowerCase();
    var sf=document.getElementById("srcFilter").value;
    var ef=document.getElementById("eduFilter").value;
    F=D.filter(function(item){
        var ms=!sv||(item.c||"").toLowerCase().includes(sv)||(item.p||"").toLowerCase().includes(sv)||(item.l||"").toLowerCase().includes(sv);
        var ms2=!sf||item.s===sf;
        var ms3=!ef||item.e===ef;
        return ms&&ms2&&ms3;
    });render();
}

function sortData(f){
    D.sort(function(a,b){
        if(f==="deadline")return(a.d||"").localeCompare(b.d||"");
        return(a[f]||"").localeCompare(b[f]||"");
    });F=D.slice();filterData();saveData();toast("排序完成");
}

function exportExcel(){
    if(!F.length){toast("没有数据");return;}
    var h=["序号","公司","职位","地点","学历","福利","截止日期","来源","链接"];
    var rows=[];F.forEach(function(item,i){rows.push([i+1,item.c,item.p,item.l,item.e,item.w,item.d,item.s,item.u]);});
    var csv=h.join(",")+"\n";rows.forEach(function(r){csv+=r.join(",")+"\n";});
    var a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="xiaozhao-radar-data.csv";a.click();
    toast("已导出CSV");
}

function toast(msg){
    var t=document.getElementById("toast");t.textContent=msg;
    t.classList.add("show");setTimeout(function(){t.classList.remove("show");},3000);
}

init();
</script>
